<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme Farm</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="../assets/images/meme-button/meme-button.png" />
</head>
<body>
  <header class="top-bar">
    <div class="brand-lockup" aria-label="Meme Farm">
      <span class="brand-mark">MF</span>
      <div>
        <h1>Meme Farm</h1>
        <span id="save-status" class="save-status">Fresh boot</span>
      </div>
    </div>
    <nav class="nav-tabs" aria-label="Game overlays">
      <button type="button" data-overlay="stats">Stats</button>
      <button type="button" data-overlay="milestones">Milestones</button>
      <button type="button" data-overlay="upgrades">Upgrades</button>
      <button type="button" data-overlay="options">Options</button>
      <button type="button" data-overlay="info">Info</button>
    </nav>
  </header>

  <main class="main-container">
    <section class="left-panel" aria-label="Main meme button and resources">
      <div class="resource-panel">
        <span id="total-likes" class="resource-number">0 Likes</span>
        <span id="likes-per-sec" class="resource-rate">0 LPS</span>
        <span id="click-power" class="resource-detail">+1 per click</span>
        <span id="subscriber-count" class="resource-detail">0 Subscribers</span>
        <div id="active-boost-timers" class="active-boost-timers" aria-live="polite" hidden></div>
      </div>

      <div class="meme-button-wrapper">
        <div id="orbit-container" aria-hidden="true"></div>
        <div class="meme-button-glow" aria-hidden="true"></div>
        <button id="meme-button" class="meme-button" type="button" aria-label="Post meme for likes"></button>
      </div>

      <div id="subscriber-container"></div>
    </section>

    <div class="divider" aria-hidden="true"></div>

    <section class="middle-panel" aria-label="Meme empire systems">
      <div class="middle-tabs" role="tablist" aria-label="Meme systems">
        <button class="middle-tab-button active" type="button" role="tab" aria-selected="true" data-tab="tab-social">Social</button>
        <button class="middle-tab-button" type="button" role="tab" aria-selected="false" data-tab="tab-lab">Meme Lab</button>
      </div>

      <div class="middle-tab-content active" id="tab-social" role="tabpanel">
        <div class="social-panel">
          <div class="social-header">
            <span class="eyebrow">Leaderboards</span>
            <h2>Social Leaderboards</h2>
            <p>Compare your meme empire across global rankings and Steam friends.</p>
          </div>

          <div class="social-controls">
            <div class="leaderboard-scope" role="tablist" aria-label="Leaderboard scope">
              <button id="leaderboard-global" class="active" type="button" role="tab" aria-selected="true" data-leaderboard-scope="global">Global</button>
              <button id="leaderboard-friends" type="button" role="tab" aria-selected="false" data-leaderboard-scope="friends">Steam Friends</button>
            </div>

            <div class="leaderboard-metric-picker">
              <span id="leaderboard-metric-label">Metric</span>
              <button id="leaderboard-metric-toggle" class="leaderboard-metric-toggle" type="button" aria-haspopup="listbox" aria-expanded="false" aria-controls="leaderboard-metric-list">
                <span data-role="selected-metric">Lifetime Likes</span>
                <small data-role="selected-metric-description">Total likes earned in this run.</small>
              </button>
              <div id="leaderboard-metric-list" class="leaderboard-metric-list" role="listbox" aria-labelledby="leaderboard-metric-label" hidden></div>
            </div>
          </div>

          <div id="leaderboard-status" class="leaderboard-status"></div>
          <div id="leaderboard-list" class="leaderboard-list" aria-live="polite"></div>
        </div>
      </div>

      <div class="middle-tab-content" id="tab-lab" role="tabpanel" hidden>
        <div id="lab-programs" class="lab-programs" aria-live="polite"></div>
      </div>
    </section>

    <div class="divider divider-right" aria-hidden="true"></div>

    <section class="right-panel" aria-label="Shop">
      <div class="shop-tabs" role="tablist" aria-label="Shop tabs">
        <button id="tab-towers" class="active" type="button" role="tab" aria-selected="true">Towers</button>
        <button id="tab-upgrades" type="button" role="tab" aria-selected="false">Upgrades</button>
      </div>
      <div id="shop-towers" class="shop-content active" role="tabpanel"></div>
      <div id="shop-upgrades" class="shop-content" role="tabpanel" hidden></div>
      <div id="next-unlock" class="next-unlock"></div>
    </section>
  </main>

  <div id="tooltip" class="tooltip" role="tooltip" hidden></div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <div id="nav-overlay" class="nav-overlay" hidden>
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
      <button id="overlay-close" class="icon-button overlay-close" type="button" aria-label="Close overlay">x</button>
      <div id="overlay-content"></div>
    </div>
  </div>

  <div id="modal-root" class="modal-root" hidden></div>

  <script type="module" src="main.js"></script>
</body>
</html>
